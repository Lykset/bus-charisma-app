<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma • Suivez votre bus</title>
    
    <!-- Open Graph pour WhatsApp, Facebook, Twitter -->
    <meta property="og:title" content="Charisma - Suivez votre bus en temps réel" />
    <meta property="og:description" content="Cliquez pour suivre la position de votre navette en direct" />
    <meta property="og:image" content="https://lykset.github.io/bus-charisma-app/logo-share.png" />
    <meta property="og:url" content="https://lykset.github.io/bus-charisma-app/share.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Charisma Mobility" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Charisma - Suivez votre bus" />
    <meta name="twitter:description" content="Position en temps réel de votre navette" />
    <meta name="twitter:image" content="https://lykset.github.io/bus-charisma-app/logo-share.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a2e;
        }
        
        .desc {
            color: #6c757d;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .btn {
            background: linear-gradient(135deg, #2c5a8c, #1e3c72);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(44,90,140,0.3);
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(44,90,140,0.4);
        }
        
        .footer {
            margin-top: 28px;
            font-size: 0.7rem;
            color: #94a3b8;
        }
        
        .route-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 24px 0;
        }
        
        .route-btn {
            background: #f8fafd;
            border: 1px solid #eef2f6;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .route-btn.active {
            background: #2c5a8c;
            color: white;
            border-color: #2c5a8c;
        }
        
        .route-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-icon">🚌</div>
        <div class="logo">Charisma</div>
        <div class="title">Suivi de bus en temps réel</div>
        <div class="desc">Cliquez ci-dessous pour suivre la position de votre navette en direct</div>
        
        <div class="route-selector">
            <div id="btnCharisma" class="route-btn active" onclick="selectRoute('charisma')">Bus Charisma</div>
            <div id="btnNavieo" class="route-btn" onclick="selectRoute('navieo')">Navieo</div>
        </div>
        
        <a href="#" id="followLink" class="btn" onclick="openFollow()">
            <span>📍</span> Suivre mon bus
        </a>
        
        <div class="footer">
            Service navettes • Église Charisma<br>
            Mise à jour en temps réel
        </div>
    </div>

    <script>
        let selectedRoute = 'charisma';
        
        function selectRoute(route) {
            selectedRoute = route;
            document.getElementById('btnCharisma').classList.remove('active');
            document.getElementById('btnNavieo').classList.remove('active');
            document.getElementById(route === 'charisma' ? 'btnCharisma' : 'btnNavieo').classList.add('active');
            updateLink();
        }
        
        function updateLink() {
            const link = document.getElementById('followLink');
            link.href = `passager.html?route=${selectedRoute}`;
        }
        
        function openFollow() {
            window.location.href = `passager.html?route=${selectedRoute}`;
        }
        
        updateLink();
    </script>
</body>
</html>
