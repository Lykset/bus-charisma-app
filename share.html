<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charisma • Suivez votre bus</title>
    
    <!-- Métadonnées pour WhatsApp -->
    <meta property="og:title" content="Charisma - Suivez votre bus en temps réel" />
    <meta property="og:description" content="🚌 Le bus est en route • Cliquez pour suivre en direct" />
    <meta property="og:image" content="https://lykset.github.io/bus-charisma-app/preview.png" />
    <meta property="og:url" content="https://lykset.github.io/bus-charisma-app/share.html" />
    <meta property="og:type" content="website" />
    
    <!-- Redirection automatique après 2 secondes -->
    <meta http-equiv="refresh" content="2;url=passager.html?route=charisma">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #6c757d;
            font-size: 0.8rem;
            margin-bottom: 24px;
        }
        
        .route {
            background: #f8fafd;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }
        
        .stops {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .stop {
            text-align: center;
            flex: 1;
        }
        
        .stop-icon {
            width: 44px;
            height: 44px;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-size: 1.1rem;
        }
        
        .stop.active .stop-icon {
            border-color: #f39c12;
            background: #fff3e0;
        }
        
        .stop-name {
            font-size: 0.65rem;
            font-weight: 600;
        }
        
        .info {
            background: #f8fafd;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .info-label {
            font-size: 0.7rem;
            color: #6c757d;
        }
        
        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .btn {
            background: linear-gradient(135deg, #2c5a8c, #1e3c72);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        
        .redirect-message {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🚌</div>
        <div class="title">Charisma</div>
        <div class="subtitle">Suivi en temps réel</div>
        
        <div class="route">
            <div class="stops">
                <div class="stop active">
                    <div class="stop-icon">⛪</div>
                    <div class="stop-name">Église</div>
                </div>
                <div class="stop">
                    <div class="stop-icon">🏠</div>
                    <div class="stop-name">Brement</div>
                </div>
                <div class="stop">
                    <div class="stop-icon">🚉</div>
                    <div class="stop-name">Noisy</div>
                </div>
                <div class="stop">
                    <div class="stop-icon">⛪</div>
                    <div class="stop-name">Retour</div>
                </div>
            </div>
        </div>
        
        <div class="info">
            <div class="info-label">Position actuelle</div>
            <div class="info-value">Église Charisma</div>
        </div>
        
        <button class="btn" onclick="window.location.href='passager.html?route=charisma'">
            📍 Suivre mon bus
        </button>
        
        <div class="redirect-message">
            Redirection automatique dans quelques secondes...
        </div>
    </div>
    
    <script>
        // Redirection après 2 secondes
        setTimeout(function() {
            window.location.href = 'passager.html?route=charisma';
        }, 2500);
    </script>
</body>
</html>
