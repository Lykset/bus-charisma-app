<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Charisma Mobility</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Charisma">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f5f7fb, #eef2f6);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { text-align: center; margin: 40px 0 30px; }
        .logo h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #1e3c72, #2c5a8c); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.7rem; color: #6c757d; margin-top: 5px; }
        .role-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #eef2f6;
        }
        .role-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .role-card.selected { border-color: #2c5a8c; background: #f8fafd; }
        .role-icon { font-size: 2rem; margin-bottom: 12px; }
        .role-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
        .role-desc { font-size: 0.8rem; color: #6c757d; }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #2c5a8c, #1e3c72);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { text-align: center; font-size: 0.65rem; color: #94a3b8; margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Charisma Mobility</h1>
            <p>Gestion de flotte • Suivi en temps réel</p>
        </div>

        <div id="roleEquipage" class="role-card" onclick="selectRole('equipage')">
            <div class="role-icon">🚌</div>
            <div class="role-title">Poste de conduite</div>
            <div class="role-desc">Conducteur & Accompagnateur • Gérez le service</div>
        </div>

        <div id="roleControleur" class="role-card" onclick="selectRole('controleur')">
            <div class="role-icon">📊</div>
            <div class="role-title">Centre de régulation</div>
            <div class="role-desc">Superviseur • Gestion de flotte</div>
        </div>

        <button id="startBtn" class="btn-primary" onclick="validateSelection()" disabled>Accéder</button>

        <div class="footer">Charisma Mobility • Solution de mobilité</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        let selectedRole = null;

        function selectRole(role) {
            selectedRole = role;
            document.getElementById('roleEquipage').classList.remove('selected');
            document.getElementById('roleControleur').classList.remove('selected');
            document.getElementById(`role${role.charAt(0).toUpperCase() + role.slice(1)}`).classList.add('selected');
            document.getElementById('startBtn').disabled = false;
        }

        function validateSelection() {
            if (!selectedRole) return;
            if (selectedRole === 'controleur') {
                const pwd = prompt("Mot de passe:");
                if (pwd === "Charisma2026") window.location.href = 'controleur.html';
                else if (pwd !== null) alert("Mot de passe incorrect");
            } else if (selectedRole === 'equipage') {
                window.location.href = 'equipage.html';
            }
        }
    </script>
</body>
</html>
