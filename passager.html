<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Charisma • Mobilité</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1a1a2e;
            line-height: 1.4;
            padding-bottom: 20px;
        }

        /* Header moderne */
        .app-header {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            padding: 20px 20px 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .service-name {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .live-badge {
            background: rgba(0,168,107,0.12);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00a86b;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .live-text {
            font-size: 0.7rem;
            font-weight: 600;
            color: #00a86b;
        }

        /* Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* État d'attente */
        .waiting-card {
            background: white;
            border-radius: 32px;
            padding: 60px 28px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .waiting-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            border-radius: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 2rem;
            color: white;
        }

        .waiting-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .waiting-text {
            color: #6c757d;
            font-size: 0.9rem;
        }

        /* Carte trajet */
        .trip-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trip-line {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .trip-direction {
            font-size: 0.7rem;
            color: #6c757d;
        }

        /* Position actuelle */
        .position-card {
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: white;
        }

        .position-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.2);
            border-radius: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .position-label {
            font-size: 0.7rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .position-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 6px 0 4px;
        }

        .position-time {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Timeline interactive */
        .timeline-card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .timeline-track {
            position: relative;
            height: 4px;
            background: #e9ecef;
            border-radius: 4px;
            margin: 30px 0 20px;
        }

        .timeline-progress {
            position: absolute;
            height: 4px;
            background: linear-gradient(90deg, #2c5a8c, #00a86b);
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .timeline-marker {
            position: absolute;
            top: -10px;
            width: 24px;
            height: 24px;
            background: white;
            border: 3px solid #2c5a8c;
            border-radius: 24px;
            transition: left 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .timeline-stops {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .timeline-stop {
            text-align: center;
            flex: 1;
        }

        .timeline-stop-dot {
            width: 8px;
            height: 8px;
            background: #cbd5e1;
            border-radius: 8px;
            margin: 0 auto 8px;
            transition: all 0.3s;
        }

        .timeline-stop.completed .timeline-stop-dot {
            background: #00a86b;
            width: 10px;
            height: 10px;
        }

        .timeline-stop.active .timeline-stop-dot {
            background: #f39c12;
            width: 12px;
            height: 12px;
            box-shadow: 0 0 0 4px rgba(243,156,18,0.2);
        }

        .timeline-stop-name {
            font-size: 0.7rem;
            font-weight: 500;
        }

        .timeline-stop-time {
            font-size: 0.6rem;
            color: #6c757d;
            margin-top: 4px;
        }

        /* Liste arrêts */
        .stops-section {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .section-header {
            padding: 18px 20px;
            background: #f8fafd;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 1px solid #eef2f6;
        }

        .stop-row {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f2f5;
            gap: 16px;
            transition: all 0.2s;
        }

        .stop-row:last-child {
            border-bottom: none;
        }

        .stop-row.completed {
            background: #fafcfd;
        }

        .stop-row.active {
            background: linear-gradient(135deg, #fff8f0, #fff5e8);
            border-left: 3px solid #f39c12;
        }

        .stop-number {
            width: 32px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6c757d;
        }

        .stop-row.completed .stop-number {
            color: #00a86b;
        }

        .stop-row.active .stop-number {
            color: #f39c12;
        }

        .stop-info {
            flex: 1;
        }

        .stop-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stop-time {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .stop-passengers {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c5a8c;
            background: #eef2f6;
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Alertes */
        .alert-card {
            background: #fff8f0;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid #ffe0b5;
        }

        .alert-icon {
            font-size: 1.2rem;
        }

        .alert-message {
            font-size: 0.85rem;
            color: #9b4a0a;
            flex: 1;
        }

        /* Footer */
        .app-footer {
            text-align: center;
            padding: 20px;
            font-size: 0.65rem;
            color: #94a3b8;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .trip-card, .position-card, .timeline-card, .stops-section {
            animation: fadeInUp 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-content">
            <div class="service-name">Charisma</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                <div class="live-text">En direct</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="waitingState" class="waiting-card">
            <div class="waiting-icon">🚌</div>
            <div class="waiting-title">En attente du départ</div>
            <div class="waiting-text">Le service n'a pas encore débuté.<br>Restez connecté pour suivre en temps réel.</div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="trip-card">
                <div class="trip-header">
                    <div>
                        <div class="trip-line" id="routeName">Bus Charisma</div>
                        <div class="trip-direction" id="routeDirection">Direction Église Charisma</div>
                    </div>
                </div>
            </div>

            <div id="alertCard" class="alert-card">
                <div class="alert-icon">⚠️</div>
                <div class="alert-message" id="alertMessage"></div>
            </div>

            <div class="position-card">
                <div class="position-icon" id="positionIcon">🚌</div>
                <div>
                    <div class="position-label">Position actuelle</div>
                    <div class="position-name" id="currentLocation">-</div>
                    <div class="position-time" id="currentTime">--:--</div>
                </div>
            </div>

            <div class="timeline-card">
                <div class="timeline-track">
                    <div class="timeline-progress" id="timelineProgress"></div>
                    <div class="timeline-marker" id="timelineMarker"></div>
                </div>
                <div class="timeline-stops" id="timelineStops"></div>
            </div>

            <div class="stops-section">
                <div class="section-header">Parcours et horaires</div>
                <div id="stopsList"></div>
            </div>
        </div>
    </div>

    <div class="app-footer">
        Charisma Mobility • Mise à jour automatique
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let selectedRoute = urlParams.get('route') || 'charisma';

        const ROUTES = {
            charisma: {
                name: "Bus Charisma",
                direction: "Direction Église Charisma",
                stops: [
                    { id: "depart", name: "Départ Église", time: "Départ" },
                    { id: "brement", name: "Brement", time: "Arrêt 1" },
                    { id: "noisy", name: "Noisy-le-Sec", time: "Arrêt 2" },
                    { id: "retour", name: "Retour Église", time: "Arrivée" }
                ]
            },
            navieo: {
                name: "Navieo",
                direction: "Direction Église Charisma",
                stops: [
                    { id: "chelles", name: "Chelles ZAC Tuilerie", time: "07:55" },
                    { id: "mairie", name: "Mairie", time: "08:00" },
                    { id: "gare", name: "Gare", time: "08:03" },
                    { id: "neuilly", name: "Neuilly/Marne", time: "08:13" },
                    { id: "lamare", name: "La Mare", time: "08:19" },
                    { id: "gagnyarena", name: "Gagny Arena", time: "08:21" },
                    { id: "jeanmoulin", name: "Jean Moulin", time: "08:24" },
                    { id: "henribarbusse", name: "Henri Barbusse", time: "08:27" },
                    { id: "garegagny", name: "Gare de Gagny", time: "08:30" },
                    { id: "chateau", name: "Château de Villemomble", time: "08:33" },
                    { id: "rosny", name: "Rosny Perrier Sud", time: "08:36" },
                    { id: "van", name: "Van derheyden", time: "08:39" },
                    { id: "ruffins", name: "Montreuil Ruffins", time: "08:49" },
                    { id: "mairiemontreuil", name: "Montreuil Mairie", time: "08:59" },
                    { id: "croixchavaux", name: "Croix de Chavaux", time: "09:05" },
                    { id: "gaulle", name: "Général de Gaulle", time: "09:08" },
                    { id: "eglise", name: "Église CHARISMA", time: "09:30" }
                ]
            }
        };

        let currentStopIndex = -1;

        function updateTimelineStops() {
            const container = document.getElementById('timelineStops');
            container.innerHTML = '';
            const stops = ROUTES[selectedRoute].stops;
            stops.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = 'timeline-stop';
                if (idx < currentStopIndex) div.classList.add('completed');
                if (idx === currentStopIndex) div.classList.add('active');
                div.innerHTML = `
                    <div class="timeline-stop-dot"></div>
                    <div class="timeline-stop-name">${stop.name.length > 12 ? stop.name.substring(0,10)+'…' : stop.name}</div>
                    <div class="timeline-stop-time">${stop.time}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderStops() {
            const container = document.getElementById('stopsList');
            container.innerHTML = '';
            const stops = ROUTES[selectedRoute].stops;
            stops.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = 'stop-row';
                if (idx < currentStopIndex) div.classList.add('completed');
                if (idx === currentStopIndex) div.classList.add('active');
                div.innerHTML = `
                    <div class="stop-number">${String(idx + 1).padStart(2, '0')}</div>
                    <div class="stop-info">
                        <div class="stop-name">${stop.name}</div>
                        <div class="stop-time">${stop.time}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateUI(data) {
            if (!data) return;

            const stopId = data.etape;
            const time = data.time || new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            if (currentStopIndex === -1 && stopId) {
                document.getElementById('waitingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('routeName').innerHTML = ROUTES[selectedRoute].name;
                document.getElementById('routeDirection').innerHTML = ROUTES[selectedRoute].direction;
            }

            const stopIndex = ROUTES[selectedRoute].stops.findIndex(s => s.id === stopId);
            if (stopIndex !== -1) {
                currentStopIndex = stopIndex;
                const currentStop = ROUTES[selectedRoute].stops[stopIndex];
                document.getElementById('positionIcon').innerHTML = stopId === 'depart' || stopId === 'retour' || stopId === 'eglise' ? '⛪' : '🚌';
                document.getElementById('currentLocation').innerHTML = currentStop.name;
                document.getElementById('currentTime').innerHTML = time;

                const progress = (stopIndex / (ROUTES[selectedRoute].stops.length - 1)) * 100;
                document.getElementById('timelineProgress').style.width = `${progress}%`;
                const markerPos = (progress / 100) * (document.querySelector('.timeline-track')?.offsetWidth - 24 || 0);
                document.getElementById('timelineMarker').style.left = `${Math.min(progress, 98)}%`;

                renderStops();
                updateTimelineStops();
            }

            if (data.trafficAlert) {
                const alertDiv = document.getElementById('alertCard');
                document.getElementById('alertMessage').innerHTML = data.trafficAlert.message;
                alertDiv.style.display = 'flex';
                setTimeout(() => alertDiv.style.display = 'none', 8000);
            }

            if (data.message && data.message.text) {
                const alertDiv = document.getElementById('alertCard');
                document.getElementById('alertMessage').innerHTML = data.message.text;
                alertDiv.style.display = 'flex';
                setTimeout(() => alertDiv.style.display = 'none', 5000);
            }
        }

        database.ref('bus-status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateUI(data);
        });

        setInterval(() => {
            if (document.getElementById('mainContent').style.display === 'block') {
                document.getElementById('currentTime').innerHTML = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
        }, 1000);

        renderStops();
        updateTimelineStops();
    </script>
</body>
</html>
