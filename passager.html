<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Charisma • Suivi bus</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Charisma">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1a1a2e;
            line-height: 1.4;
        }

        .app-header {
            background: white;
            padding: 20px 20px 12px;
            border-bottom: 1px solid #eef2f6;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .service-name {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .live-badge {
            background: rgba(0,168,107,0.12);
            padding: 6px 14px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #00a86b;
            border-radius: 8px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .position-card {
            background: linear-gradient(135deg, #1e3c72, #2c5a8c);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            color: white;
        }

        .position-label {
            font-size: 0.7rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .position-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 8px 0 4px;
        }

        .position-time {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        .trip-status {
            background: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eef2f6;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1e3c72;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .timeline-section {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #eef2f6;
        }

        .section-title {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .horizontal-stops {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 30px 0 20px;
        }

        .horizontal-stop {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .stop-dot {
            width: 12px;
            height: 12px;
            background: #cbd5e1;
            border-radius: 12px;
            margin: 0 auto 10px;
            transition: all 0.3s;
        }

        .horizontal-stop.completed .stop-dot {
            background: #00a86b;
            width: 14px;
            height: 14px;
        }

        .horizontal-stop.active .stop-dot {
            background: #f39c12;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 0 4px rgba(243,156,18,0.2);
        }

        .stop-name {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stop-time {
            font-size: 0.6rem;
            color: #6c757d;
        }

        .timeline-line {
            position: absolute;
            top: 5px;
            left: 0;
            right: 0;
            height: 2px;
            background: #eef2f6;
            z-index: 1;
        }

        .timeline-progress-line {
            position: absolute;
            top: 5px;
            left: 0;
            height: 2px;
            background: linear-gradient(90deg, #00a86b, #f39c12);
            width: 0%;
            transition: width 0.5s ease;
            z-index: 2;
        }

        .stops-compact {
            margin-top: 20px;
            border-top: 1px solid #eef2f6;
            padding-top: 20px;
        }

        .compact-stop {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
        }

        .compact-stop:last-child {
            border-bottom: none;
        }

        .compact-number {
            width: 32px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #6c757d;
        }

        .compact-stop.completed .compact-number {
            color: #00a86b;
        }

        .compact-stop.active .compact-number {
            color: #f39c12;
        }

        .compact-info {
            flex: 1;
        }

        .compact-name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .compact-time {
            font-size: 0.65rem;
            color: #6c757d;
            margin-top: 2px;
        }

        .compact-badge {
            font-size: 0.65rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f8fafd;
        }

        .compact-stop.completed .compact-badge {
            background: #e8f5e9;
            color: #00a86b;
        }

        .compact-stop.active .compact-badge {
            background: #fff3e0;
            color: #f39c12;
        }

        .alert-card {
            background: #fff8f0;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid #ffe0b5;
        }

        .waiting-card {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 28px;
        }

        .waiting-icon {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .waiting-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .waiting-text {
            color: #6c757d;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.65rem;
            color: #94a3b8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .position-card, .trip-status, .timeline-section {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="app-header">
        <div class="header-content">
            <div class="service-name">Bus Charisma</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                <span>En direct</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="waitingState" class="waiting-card">
            <div class="waiting-icon">🚌</div>
            <div class="waiting-title">En attente du départ</div>
            <div class="waiting-text">Le bus n'a pas encore commencé son trajet</div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="position-card">
                <div class="position-label">Position actuelle</div>
                <div class="position-name" id="currentLocation">-</div>
                <div class="position-time" id="currentTime">--:--</div>
            </div>

            <div class="trip-status">
                <div class="stat-item">
                    <div class="stat-value" id="progressPercent">0%</div>
                    <div class="stat-label">Trajet</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="remainingStops">4</div>
                    <div class="stat-label">Arrêts restants</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalPassengers">0</div>
                    <div class="stat-label">Passagers</div>
                </div>
            </div>

            <div id="alertCard" class="alert-card">
                <span>⚠️</span>
                <span id="alertMessage" style="flex:1;"></span>
            </div>

            <div class="timeline-section">
                <div class="section-title">Progression du trajet</div>
                <div class="horizontal-stops" id="horizontalStops"></div>
                <div class="stops-compact" id="compactStops"></div>
            </div>
        </div>

        <div class="footer">Charisma Mobility • Mise à jour automatique</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC4sWMc3fNaMpZ9cD8ahQdMJn6BjRyJDzk",
            authDomain: "charisma-bus.firebaseapp.com",
            databaseURL: "https://charisma-bus-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "charisma-bus",
            storageBucket: "charisma-bus.firebasestorage.app",
            messagingSenderId: "630450080183",
            appId: "1:630450080183:web:c204b463f63b12a8d30032"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const STOPS = [
            { id: "depart", name: "Église Charisma", time: "Départ" },
            { id: "brement", name: "Brement", time: "Arrêt 1" },
            { id: "noisy", name: "Noisy-le-Sec", time: "Arrêt 2" },
            { id: "retour", name: "Retour Église", time: "Arrivée" }
        ];

        let currentStopIndex = -1;
        let passengersData = {};

        function updateUI(data) {
            if (!data) return;

            const stopId = data.etape;
            const time = data.time || new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            if (currentStopIndex === -1 && stopId) {
                document.getElementById('waitingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }

            const stopIndex = STOPS.findIndex(s => s.id === stopId);
            if (stopIndex !== -1) {
                currentStopIndex = stopIndex;
                const currentStop = STOPS[stopIndex];
                document.getElementById('currentLocation').innerHTML = currentStop.name;
                document.getElementById('currentTime').innerHTML = time;

                const progress = (stopIndex / (STOPS.length - 1)) * 100;
                document.getElementById('progressPercent').innerHTML = `${Math.round(progress)}%`;
                document.getElementById('remainingStops').innerHTML = STOPS.length - stopIndex - 1;
                document.getElementById('timelineProgress').style.width = `${progress}%`;

                renderHorizontalStops();
                renderCompactStops();
            }

            if (data.passengers) {
                passengersData[stopId] = data.passengers;
                const total = Object.values(passengersData).reduce((a,b) => a+b, 0);
                document.getElementById('totalPassengers').innerHTML = total;
            }

            if (data.trafficAlert) {
                const alertDiv = document.getElementById('alertCard');
                document.getElementById('alertMessage').innerHTML = data.trafficAlert.message;
                alertDiv.style.display = 'flex';
                setTimeout(() => alertDiv.style.display = 'none', 8000);
            }
        }

        function renderHorizontalStops() {
            const container = document.getElementById('horizontalStops');
            container.innerHTML = `
                <div class="timeline-line"></div>
                <div class="timeline-progress-line" id="timelineProgress" style="width: ${currentStopIndex >= 0 ? (currentStopIndex / (STOPS.length - 1)) * 100 : 0}%"></div>
            `;
            
            STOPS.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = 'horizontal-stop';
                if (idx < currentStopIndex) div.classList.add('completed');
                if (idx === currentStopIndex) div.classList.add('active');
                div.innerHTML = `
                    <div class="stop-dot"></div>
                    <div class="stop-name">${stop.name.length > 12 ? stop.name.substring(0,10)+'…' : stop.name}</div>
                    <div class="stop-time">${stop.time}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderCompactStops() {
            const container = document.getElementById('compactStops');
            container.innerHTML = '';
            
            STOPS.forEach((stop, idx) => {
                const div = document.createElement('div');
                div.className = 'compact-stop';
                if (idx < currentStopIndex) div.classList.add('completed');
                if (idx === currentStopIndex) div.classList.add('active');
                
                let badgeText = 'À venir';
                if (idx < currentStopIndex) badgeText = 'Effectué';
                if (idx === currentStopIndex) badgeText = 'En cours';
                
                div.innerHTML = `
                    <div class="compact-number">${String(idx + 1).padStart(2, '0')}</div>
                    <div class="compact-info">
                        <div class="compact-name">${stop.name}</div>
                        <div class="compact-time">${stop.time}</div>
                    </div>
                    <div class="compact-badge">${badgeText}</div>
                `;
                container.appendChild(div);
            });
        }

        database.ref('bus-status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) updateUI(data);
        });

        database.ref('passengers').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                passengersData = data;
                const total = Object.values(passengersData).reduce((a,b) => a+b, 0);
                document.getElementById('totalPassengers').innerHTML = total;
            }
        });

        setInterval(() => {
            if (document.getElementById('mainContent').style.display === 'block') {
                document.getElementById('currentTime').innerHTML = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
        }, 1000);

        renderHorizontalStops();
        renderCompactStops();
    </script>
</body>
</html>
